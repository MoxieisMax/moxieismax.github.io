---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  <p class="updated">Last updated: {{ page.last_updated }}</p>

  <section>
    {{ content }}
  </section>

  {% if page.related %}
  <section>
    <h2>Related guides</h2>
    <ul>
      {% for r in page.related %}
        <li><a href="{{ r.url | relative_url }}">{{ r.title }}</a></li>
      {% endfor %}
    </ul>
  </section>
  {% endif %}

  {% include disclosure.html %}
</article>
